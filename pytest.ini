[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --alluredir=reports/allure-results
log_cli = true
log_cli_level = INFO
log_file = reports/logs/test.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(message)s
